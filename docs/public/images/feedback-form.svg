<svg xmlns="http://www.w3.org/2000/svg" width="400" height="280" viewBox="0 0 400 280">
  <rect width="400" height="280" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <!-- Modal backdrop -->
  <rect x="50" y="20" width="300" height="240" rx="12" fill="white" stroke="#d1d5db" stroke-width="1" filter="url(#shadow)"/>
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.1"/>
    </filter>
  </defs>
  <!-- Title -->
  <text x="200" y="50" text-anchor="middle" fill="#111827" font-size="15" font-family="system-ui" font-weight="bold">Add Annotation</text>
  <!-- Element info -->
  <text x="70" y="75" fill="#6b7280" font-size="11" font-family="system-ui">Element: button.submit-btn "Save Changes"</text>
  <!-- Feedback field -->
  <text x="70" y="100" fill="#374151" font-size="12" font-family="system-ui" font-weight="600">Feedback</text>
  <rect x="70" y="108" width="260" height="50" rx="4" fill="white" stroke="#d1d5db" stroke-width="1"/>
  <text x="80" y="128" fill="#6b7280" font-size="11" font-family="system-ui">Describe the issue...</text>
  <!-- Expected/Actual toggle -->
  <text x="70" y="182" fill="#6366f1" font-size="11" font-family="system-ui">▶ Expected / Actual (optional)</text>
  <!-- Submit button -->
  <rect x="70" y="205" width="260" height="36" rx="6" fill="#6366f1"/>
  <text x="200" y="228" text-anchor="middle" fill="white" font-size="13" font-family="system-ui" font-weight="600">Submit</text>
</svg>